<html>
    <head>
        <title>
            array loop
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
        <h1>Array Loop</h1>
        <input type="number" placeholder="Enter the number" id="array"><br></br>
        <button onclick="createArray()" class="btn">Create Array</button><br></br>
        <p id="arrayresult"></p>
    </div>
        </body>
        <script>
            function createArray() {
                let number = document.getElementById("array").value;
                let output="";
                for(let i = 1; i<=number; i++){
                output = output + i + " ";
                }
                document.getElementById("arrayresult").innerText = output;
            }
            function showFruits() {
                let fruits = ["Apple", "Banana", "Mango", "grapes"];
                let output = "";
                for (let i = 0; i < fruits.length; i++) {
                    output = output + "<li>" + fruits[i] + "</li>";
                }
                document.getElementById("fruitlist").innerHTML = output;
            }
            </script>
            <div class="navbar">
                <h2>2. Array Example </h2>
                <button class="btn" onclick="showFruits()">
                    Show Fruits
                </button>
                <ul id="fruitlist"></ul>
            </div>
            <div class="task">
                <h2>4. Simple To-Do List</h2>
                <input type="text" placeholder="Enter a task" id="taskinput"><br></br>
                <button class="btn" onclick="addTask()">Add Task</button>
                <ul id="tasklist"></ul>
            </div>
            <script>
                let tasks = [];
                function addTask() {
                    let task = document.getElementById("taskinput").value;
                    tasks.push(task);
                    let result = " ";
                    for(let i = 0; i < tasks.length; i++){
                    result = result + "<li>" + tasks[i] + "</li>";
                    
                }
                document.getElementById("tasklist").innerHTML = result;
            }
            </script>
</html>
