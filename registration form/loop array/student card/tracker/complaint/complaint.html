<html>
    <head>
        <title></title>
        
    </head>
    <link rel="stylesheet" href="style.css">    
    <body>
        <div class="container">
            <h1>campus Complaint Box</h1>
            <input type="text" placeholder="enter student name" id="studentname"><br></br>
            <textarea placeholder="enter  complaint" id="complainttext"></textarea><br></br>
            <button class="btn"onclick="addComplaint()">Add Complaint</button>
            <div id="complaintContainer"></div>
        </div>
    </body>
    <script>
        let complaints = [];
        function addComplaint() {
            let studentname = document.getElementById("studentname").value;
            let complainttext = document.getElementById("complainttext").value;
            let complaint = {
                name: studentname,
                text: complainttext
            };
            complaints.push(complaint);
            displayComplaints();
        }
        function displayComplaints() {
            let result = "";
            for (let i = 0; i < complaints.length; i++) {
                result += `
                <div class="card">
                    <h2>${complaints[i].name}</h2>
                    <p>${complaints[i].text}</p>
                    <button class="delete-button" onclick="deleteComplaint(${i})">Delete</button>
                    
                </div>`;
            }
            document.getElementById("complaintContainer").innerHTML = result;
        }
        function deleteComplaint(index) {
            complaints.splice(index, 1);
            displayComplaints();
        }
        
    
    </script>
</html>
